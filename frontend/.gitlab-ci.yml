stages:
  - test
  - build

variables:
  NODE_ENV: test

# Backend Tests
backend_tests:
  stage: test
  image: node:20-alpine
  before_script:
    - cd backend
    - npm install
  script:
    - npm test
  only:
    - main
    - dev
    - merge_requests

# Backend Build
backend_build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t backend ./backend
  only:
    - main
    - dev
    - merge_requests
