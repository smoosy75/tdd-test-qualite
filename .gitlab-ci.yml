stages:
  - lint
  - test
  - quality
  - build

variables:
  NODE_ENV: test

# ---------- LINT / FORMAT ----------
backend_lint_format:
  stage: lint
  image: node:20-alpine
  before_script:
    - cd backend
    - npm ci --no-audit --no-fund
  script:
    - npm run lint
    - npm run format:check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "feature/add-sonar-and-lint")'

frontend_lint_format:
  stage: lint
  image: node:20-alpine
  before_script:
    - cd frontend
    - npm ci --no-audit --no-fund
  script:
    - npm run lint
    - npm run format:check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "feature/add-sonar-and-lint")'

# ---------- TESTS (produce lcov for Sonar) ----------
# Backend Tests
backend_tests:
  stage: test
  image: node:20-alpine
  before_script:
    - cd backend
    - npm ci --no-audit --no-fund
  script:
    - npm run test:ci
  artifacts:
    when: always
    paths:
      - backend/coverage/lcov.info
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "feature/add-sonar-and-lint")'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# Frontend Tests
frontend_tests:
  stage: test
  image: node:20-alpine
  before_script:
    - cd frontend
    - npm ci --no-audit --no-fund
  script:
    - npm run test:ci
  artifacts:
    when: always
    paths:
      - frontend/coverage/lcov.info
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "feature/add-sonar-and-lint")'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ---------- SONARQUBE ANALYSIS ----------
sonarqube_backend:
  stage: quality
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  needs: ["backend_tests"]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script: |
    sonar-scanner \
      -Dsonar.host.url="$SONAR_HOST_URL" \
      -Dsonar.login="$SONAR_TOKEN" \
      -Dsonar.projectKey="bardanmi_tdd-and-quality" \
      -Dsonar.projectName="tdd&quality" \
      -Dsonar.sources=backend/src \
      -Dsonar.tests=backend/src \
      -Dsonar.test.inclusions="**/*.test.*,**/*.spec.*" \
      -Dsonar.javascript.lcov.reportPaths=backend/coverage/lcov.info \
      -Dsonar.typescript.tsconfigPaths=backend/tsconfig.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "feature/add-sonar-and-lint")'

sonarqube_frontend:
  stage: quality
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  needs: ["frontend_tests"]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script: |
    sonar-scanner \
      -Dsonar.host.url="$SONAR_HOST_URL" \
      -Dsonar.login="$SONAR_TOKEN" \
      -Dsonar.projectKey=bardanmi_tdd-and-quality \
      -Dsonar.projectName=tdd&quality \
      -Dsonar.sources=frontend/src \
      -Dsonar.tests=frontend/src \
      -Dsonar.test.inclusions="**/*.test.*,**/*.spec.*" \
      -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info \
      -Dsonar.typescript.tsconfigPaths=frontend/tsconfig.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "feature/add-sonar-and-lint")'

# ---------- BUILD ----------
# Backend Build
backend_build:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
  script:
    - docker build -t backend:$(echo "$CI_COMMIT_SHORT_SHA") ./backend
    # If we want to push to GitLab Container Registry, uncomment:
    # - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    # - docker tag backend:$(echo "$CI_COMMIT_SHORT_SHA") "$CI_REGISTRY_IMAGE:$(echo "$CI_COMMIT_SHORT_SHA")"
    # - docker push "$CI_REGISTRY_IMAGE:$(echo "$CI_COMMIT_SHORT_SHA")"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "feature/add-sonar-and-lint")'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# Frontend Build
frontend_build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t frontend ./frontend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "feature/add-sonar-and-lint")'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
