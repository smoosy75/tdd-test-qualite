services:
  #  PocketBase
  pocketbase:
    image: elestio/pocketbase:latest
    container_name: pocketbase
    networks:
      my-network:
        aliases:
          - pocketbase
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb_data

  #  Base de données (PostgreSQL)
  db:
    image: postgres:15
    container_name: forum-db
    networks:
      - my-network
    environment:
      POSTGRES_USER: forum
      POSTGRES_PASSWORD: forum
      POSTGRES_DB: forum_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  #  Backend (Express + TS)
  backend:
    build:
      context: ./backend
    container_name: backend
    networks:
      - my-network
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://forum:forum@db:5432/forum_db
      POCKETBASE_URL: http://127.0.0.1:8090
    depends_on:
      - db
      - pocketbase

  #  Frontend (Vite + React)
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    networks:
      - my-network
    ports:
      - "5173:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

# volume pour PostgreSQL
volumes:
  db_data:

networks:
  my-network:
    # Specify driver options
    driver: bridge
